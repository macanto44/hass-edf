[tool.ruff]
target-version = "py312"
line-length = 88
select = ["E", "W", "F", "I", "UP", "B", "SIM", "S"]

[tool.ruff.per-file-ignores]
"tests/*" = ["S101"]  # allow assert in tests

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
